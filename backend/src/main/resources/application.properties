spring.application.name=apex-fit-backend

# Porta do Servidor (Injetada pelo Render/Railway ou 8080 local)
server.port=${PORT:8080}

# Configuracao do Banco de Dados
# Tenta usar a URL completa (DATABASE_URL) ou monta usando variaveis padroes do Postgres (PG*)
spring.datasource.url=${DATABASE_URL:${DB_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:apexfit_db}?sslmode=${PGSSLMODE:prefer}}}
spring.datasource.username=${PGUSER:apexuser}
spring.datasource.password=${PGPASSWORD:apexpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — tuning para Neon (free tier tem limite de conexoes simultaneas)
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
# Desabilita prepared statements server-side no nivel JDBC.
# OBRIGATORIO para Neon PgBouncer (transaction mode): o pooler nao suporta
# prepared statements de sessao, causando falha na inicializacao do SessionFactory.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA / Hibernate
# NUNCA usar "update" em producao com Flyway — Flyway e o unico gerenciador de schema
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Desabilita acesso a metadados JDBC durante o boot do Hibernate.
# OBRIGATORIO para compatibilidade com Neon PgBouncer (transaction mode), que nao
# suporta queries session-level (ex: SELECT version()) usadas pelo Hibernate 6 no startup.
# Sem isso, o entityManagerFactory falha e gera o erro jpaSharedEM_entityManagerFactory.
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Configuracoes de Erro e Validacao
server.error.include-message=always
server.error.include-binding-errors=always

# Chave JWT — producao DEVE definir JWT_SECRET via variavel de ambiente
# O fallback abaixo e usado SOMENTE em ambiente de desenvolvimento local
app.jwt.secret=${JWT_SECRET:apex-fit-local-dev-jwt-secret-key-minimo-256-bits-ok}

# Chave da API Google Gemini (injetada via variavel de ambiente GEMINI_API_KEY)
gemini.api.key=${GEMINI_API_KEY}
